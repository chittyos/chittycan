name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Workflow secret policy checks
        run: bash scripts/security/check-workflow-secrets.sh

      - name: Secret scan gate
        run: bash scripts/security/scan-secrets.sh

      - name: Dependency audit gate
        run: npm audit --audit-level=high

  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    needs: security-gates

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (TypeScript check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  cross-platform-smoke:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: security-gates
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Smoke test - help
        run: node dist/index.js --help

      - name: Smoke test - version
        run: node dist/index.js --version

      - name: Smoke test - ext list
        run: node dist/index.js ext list || true
